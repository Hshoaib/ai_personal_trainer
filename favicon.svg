<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8763C"/>
      <stop offset="0.55" stop-color="#E8943C"/>
      <stop offset="1" stop-color="#E0B23C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#E8763C" stop-opacity="0.16"/>
      <stop offset="0.6" stop-color="#E8763C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#14110D"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- speed streaks -->
  <g stroke="#E8763C" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <path d="M4 22 L9 22"/>
    <path d="M3 29 L8 29"/>
  </g>

  <!-- Runner: leaning into a stride -->
  <g fill="url(#warm)" stroke="url(#warm)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 16 L15 30" stroke-width="8" fill="none"/>
    <path d="M15 30 L24 31 L20 41" stroke-width="6.5" fill="none"/>
    <path d="M15 30 L9 38 L6 46" stroke-width="6.5" fill="none"/>
    <path d="M20 17 L25 20 L24 13" stroke-width="5" fill="none"/>
    <path d="M20 17 L13 21 L9 25" stroke-width="5" fill="none"/>
    <circle cx="22" cy="11" r="4.6"/>
  </g>

  <!-- Squatter: bottom of a back squat -->
  <g fill="url(#warm)" stroke="url(#warm)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M46 18 L45 30" stroke-width="8" fill="none"/>
    <path d="M45 30 L38 34 L39 45" stroke-width="6.5" fill="none"/>
    <path d="M45 30 L52 34 L51 45" stroke-width="6.5" fill="none"/>
    <path d="M45 20 L42 23 L41 17" stroke-width="5" fill="none"/>
    <path d="M46 20 L49 23 L50 17" stroke-width="5" fill="none"/>
    <path d="M36 17 L56 17" stroke-width="4" fill="none"/>
    <circle cx="46" cy="12" r="4.6"/>
    <circle cx="36" cy="17" r="3.3"/>
    <circle cx="56" cy="17" r="3.3"/>
  </g>

  <!-- ground under the squatter -->
  <path d="M37 49 L55 49" stroke="url(#warm)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
